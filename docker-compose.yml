services:
  web: 
    container_name: saunas-php
    build: ./docker-config/php
    ports:
      - '5173:5173'
    volumes:
      - ./src:/var/www/
    depends_on:
      - mariadb

  nginx:
    container_name: saunas-nginx
    image: nginx
    build: ./docker-config/nginx
    ports:
      - "81:80"
    volumes:
      - ./src:/var/www
      - ./docker-config/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web

  mariadb:
    container_name: saunas-mariadb
    image: mariadb
    ports:
      - 3306:3306
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
      
    volumes:
      - ./docker-config/mariadb/data:/var/lib/mysql
      - ./docker-config/mariadb/data/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./docker-config/mariadb/data/sql:/docker-entrypoint-initdb.d